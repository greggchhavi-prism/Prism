<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Prism Profile is on its way</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e1a; --text: #e8e6f0; --text-dim: #5e5a78; --text-muted: #9490b0;
    --prism-gradient: linear-gradient(135deg, #4f46e5, #7c3aed, #ec4899, #f59e0b);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 32px; }
  body::before { content: ''; position: fixed; top: -30%; left: -20%; width: 70%; height: 70%; background: radial-gradient(ellipse, rgba(79,70,229,0.12) 0%, transparent 70%); pointer-events: none; }
  .prism-mark { width: 56px; height: 56px; margin-bottom: 40px; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
  .label { font-size: 11px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 24px; }
  .heading { font-family: 'Cormorant Garamond', serif; font-size: clamp(32px, 6vw, 52px); font-weight: 300; font-style: italic; line-height: 1.3; margin-bottom: 24px; max-width: 560px; }
  .subtext { font-size: 15px; color: var(--text-muted); line-height: 1.75; max-width: 420px; }
  .fearless { background: var(--prism-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .dots { display: flex; gap: 8px; justify-content: center; margin-top: 48px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: pulse 1.4s ease-in-out infinite; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.3); } }
</style>
</head>
<body>
  <svg class="prism-mark" viewBox="0 0 64 64" fill="none">
    <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4f46e5"/><stop offset="40%" stop-color="#7c3aed"/><stop offset="75%" stop-color="#ec4899"/><stop offset="100%" stop-color="#f59e0b"/></linearGradient></defs>
    <polygon points="32,4 60,56 4,56" fill="none" stroke="url(#lg)" stroke-width="1.5"/>
    <line x1="32" y1="4" x2="32" y2="56" stroke="url(#lg)" stroke-width="0.8" stroke-dasharray="2,3" opacity="0.5"/>
    <circle cx="32" cy="4" r="2" fill="white" opacity="0.6"/>
  </svg>
  <p class="label">Your Prism Profile</p>
  <h1 class="heading">Your profile is on its way.</h1>
  <p class="subtext">Check your email in the next few minutes — your Prism profile will be waiting for you there. <span class="fearless">Fearless & Undefined.</span></p>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</body>
</html>
